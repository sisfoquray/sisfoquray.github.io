<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Yayasan</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb', // Blue-600 sebagai default
                        secondary: '#475569' // Slate-600
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 antialiased transition-colors duration-300">
    
    <div id="global-loader" class="fixed inset-0 z-50 bg-white dark:bg-slate-900 flex flex-col items-center justify-center transition-opacity duration-300">
        <i class="fa-solid fa-circle-notch fa-spin text-5xl text-primary mb-4"></i>
        <h2 class="text-xl font-bold">Memuat Sistem Yayasan...</h2>
    </div>

    <div id="app-root" class="h-screen w-full flex overflow-hidden hidden">
        
        <aside id="app-sidebar" class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col z-50">
            </aside>

        <div class="flex-1 flex flex-col h-full relative overflow-hidden">
            <header id="app-header" class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-4">
                 </header>

            <main id="view-container" class="flex-1 overflow-y-auto p-4 custom-scrollbar bg-slate-50 dark:bg-slate-900">
                </main>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
